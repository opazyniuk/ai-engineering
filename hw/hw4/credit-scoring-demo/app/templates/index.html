<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Scoring Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container { max-width: 520px; width: 100%; }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        form {
            background: #1a1d27;
            border: 1px solid #2a2d37;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f1117;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #4a9eff;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4a9eff;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #3a8eef; }

        .result {
            background: #1a1d27;
            border: 1px solid #2a2d37;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .result-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2rem;
            font-weight: 700;
        }
        .approved { color: #4ade80; }
        .rejected { color: #f87171; }
        .probability {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Credit Scoring</h1>
        <p class="subtitle">Демо-проєкт: передбачення схвалення кредиту</p>

        <form method="post" action="/predict">
            <div class="field">
                <label>{{ labels.age }}</label>
                <input type="number" name="age" step="1" min="18" max="80"
                       value="{{ values.get('age', 35) }}" required>
            </div>
            <div class="field">
                <label>{{ labels.monthly_income }}</label>
                <input type="number" name="monthly_income" step="1000" min="0"
                       value="{{ values.get('monthly_income', 35000) }}" required>
            </div>
            <div class="field">
                <label>{{ labels.num_delinquencies }}</label>
                <input type="number" name="num_delinquencies" step="1" min="0" max="20"
                       value="{{ values.get('num_delinquencies', 0) }}" required>
            </div>
            <div class="field">
                <label>{{ labels.credit_term_months }}</label>
                <input type="number" name="credit_term_months" step="1" min="1" max="120"
                       value="{{ values.get('credit_term_months', 24) }}" required>
            </div>
            <div class="field">
                <label>{{ labels.credit_amount }}</label>
                <input type="number" name="credit_amount" step="1000" min="0"
                       value="{{ values.get('credit_amount', 100000) }}" required>
            </div>
            <div class="field">
                <label>{{ labels.debt_to_income }}</label>
                <input type="number" name="debt_to_income" step="0.01" min="0" max="5"
                       value="{{ values.get('debt_to_income', 0.15) }}" required>
            </div>
            <button type="submit">Перевірити</button>
        </form>

        {% if result %}
        <div class="result">
            <div class="result-label">Рішення банку</div>
            <div class="result-value {{ 'approved' if result.approved == 1 else 'rejected' }}">
                {{ result.label }}
            </div>
            {% if result.probability is not none %}
            <div class="probability">
                Ймовірність схвалення: {{ (result.probability * 100) | round(1) }}%
            </div>
            {% endif %}
        </div>
        {% endif %}
    </div>
</body>
</html>
